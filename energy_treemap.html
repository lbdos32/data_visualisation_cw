<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Renewable Energy Treemap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #111; padding: 24px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
    #year-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 13px; color: #555; }
    #year-select { font-size: 13px; padding: 4px 8px; border-radius: 6px; border: 1px solid #ccc; background: #fff; color: #111; }
    #total-label { margin-left: auto; font-size: 13px; color: #555; }
    #total-val { font-weight: 500; color: #111; }
    #breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; margin-bottom: 8px; min-height: 24px; }
    #breadcrumb .crumb-link { cursor: pointer; color: #1a6bb5; }
    #breadcrumb .crumb-link:hover { text-decoration: underline; }
    .crumb-sep { color: #aaa; }
    #back-btn { display: none; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: #1a6bb5; border: none; background: none; padding: 0; margin-bottom: 12px; }
    #back-btn:hover { text-decoration: underline; }
    #treemap-container { width: 100%; }
    .tm-cell { cursor: pointer; }
    .tm-cell rect { transition: opacity 0.15s; }
    .tm-cell:hover rect { opacity: 0.78; }
  </style>
</head>
<body>

<h1>UK Renewable Energy Sources</h1>

  <label for="year-select">Year</label>
  <select id="year-select"></select>
  <span id="total-label">Total renewable: <span id="total-val">—</span> Mtoe</span>
</div>

<div id="breadcrumb"></div>
<button id="back-btn">← back to categories</button>
<div id="treemap-container"></div>

const CATEGORIES = {
  'Water & wind':       ['Hydroelectric power', 'Wind wave tidal'],
  'Solar & geothermal': ['Solar photovoltaic', 'Geothermal aquifers'],
  'Gas':                ['Landfill gas', 'Sewage gas', 'Biogas'],
  'Waste':              ['Municipal solid waste', 'Non-municipal solid waste'],
  'Animal & plant':     ['Animal Biomass', 'Plant Biomass', 'Straw'],
  'Wood & derivatives': ['Wood', 'Wood Dry', 'Wood Seasoned', 'Wood Wet', 'Coffee logs', 'Woodchip', 'Wood Pellets', 'Wood Briquettes', 'Charcoal'],
  'Liquid biofuels':    ['Liquid bio-fuels', 'Bioethanol', 'Biodiesel', 'SAF']
};

const CAT_COLORS = {
  'Water & wind':       { fill: '#B5D4F4', stroke: '#185FA5', text: '#0C447C' },
  'Solar & geothermal': { fill: '#FAC775', stroke: '#BA7517', text: '#633806' },
  'Gas':                { fill: '#9FE1CB', stroke: '#0F6E56', text: '#085041' },
  'Waste':              { fill: '#D3D1C7', stroke: '#5F5E5A', text: '#444441' },
  'Animal & plant':     { fill: '#C0DD97', stroke: '#3B6D11', text: '#27500A' },
  'Wood & derivatives': { fill: '#F5C4B3', stroke: '#993C1D', text: '#712B13' },
  'Liquid biofuels':    { fill: '#CECBF6', stroke: '#534AB7', text: '#3C3489' }
};

const rows = RAW.trim().split('\n');
const headers = rows[0].split(',');
const data = rows.slice(1).map(r => {
  const vals = r.split(',');
  const obj = {};
  headers.forEach((h, i) => obj[h] = vals[i]);
  return obj;
});

const years = data.map(d => d.Year);
const sel = document.getElementById('year-select');
years.forEach(y => {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  sel.appendChild(o);
});
sel.value = '2023';

const parseVal = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

function getYearRow(y) { return data.find(d => d.Year === y); }

function buildRoot(yearRow) {
  return {
    name: 'All',
    children: Object.entries(CATEGORIES).map(([cat, sources]) => ({
      name: cat,
      children: sources.map(s => ({ name: s, value: parseVal(yearRow[s]) })).filter(d => d.value > 0),
      value: sources.reduce((a, s) => a + parseVal(yearRow[s]), 0)
    })).filter(d => d.value > 0)
  };
}

function render() {
  const year = sel.value;
  const yearRow = getYearRow(year);
  const fullRoot = buildRoot(yearRow);

  const total = fullRoot.children.reduce((a, c) => a + c.value, 0);
  document.getElementById('total-val').textContent = total.toFixed(2);

  const container = document.getElementById('treemap-container');
  container.innerHTML = '';

  const W = container.offsetWidth || 900;
  const H = Math.round(W * 0.55);

  const svg = d3.select(container).append('svg')
    .attr('width', W).attr('height', H).attr('viewBox', `0 0 ${W} ${H}`);

  const crumb = document.getElementById('breadcrumb');
  const backBtn = document.getElementById('back-btn');

  function drawTop() {
    backBtn.style.display = 'none';
    crumb.innerHTML = '<span style="color:#555;cursor:default">All categories</span>';

    svg.selectAll('*').remove();
    const hier = d3.hierarchy(fullRoot).sum(d => d.value).sort((a, b) => b.value - a.value);
    d3.treemap().size([W, H]).padding(3)(hier);

    const cells = svg.selectAll('.tm-cell')
      .data(hier.children)
      .join('g').attr('class', 'tm-cell')
      .attr('transform', d => `translate(${d.x0},${d.y0})`)
      .on('click', (e, d) => drawCat(d.data.name));

    cells.append('rect')
      .attr('width',  d => Math.max(0, d.x1 - d.x0))
      .attr('height', d => Math.max(0, d.y1 - d.y0))
      .attr('rx', 4)
      .attr('fill',   d => CAT_COLORS[d.data.name]?.fill   || '#ccc')
      .attr('stroke', d => CAT_COLORS[d.data.name]?.stroke || '#999')
      .attr('stroke-width', 1);

    cells.each(function(d) {
      const cw = d.x1 - d.x0, ch = d.y1 - d.y0;
      if (cw < 30 || ch < 20) return;
      const col = CAT_COLORS[d.data.name]?.text || '#333';
      const g = d3.select(this);
      const pct = ((d.data.value / total) * 100).toFixed(1) + '%';
      if (ch > 44) {
        g.append('text').attr('x', 8).attr('y', 20)
          .attr('font-size', Math.min(13, cw / 7)).attr('font-weight', 500).attr('fill', col)
          .text(d.data.name.length > cw / 7 ? d.data.name.slice(0, Math.floor(cw / 7)) + '…' : d.data.name);
        g.append('text').attr('x', 8).attr('y', 36)
          .attr('font-size', 11).attr('fill', col).attr('opacity', 0.8)
          .text(d.data.value.toFixed(2) + ' Mtoe · ' + pct);
      } else {
        g.append('text').attr('x', 6).attr('y', ch / 2 + 4)
          .attr('font-size', Math.min(12, cw / 8)).attr('font-weight', 500).attr('fill', col)
          .text(d.data.name);
      }
    });
  }

  function drawCat(catName) {
    backBtn.style.display = 'flex';
    crumb.innerHTML = `<span class="crumb-link" id="crumb-home">All categories</span><span class="crumb-sep"> › </span><span style="color:#111;cursor:default">${catName}</span>`;
    document.getElementById('crumb-home').addEventListener('click', drawTop);

    const catData = fullRoot.children.find(c => c.name === catName);
    if (!catData) return;
    const catTotal = catData.children.reduce((a, c) => a + c.value, 0);

    svg.selectAll('*').remove();
    const subRoot = { name: catName, children: catData.children };
    const hier = d3.hierarchy(subRoot).sum(d => d.value).sort((a, b) => b.value - a.value);
    d3.treemap().size([W, H]).padding(3)(hier);

    const base = CAT_COLORS[catName] || { fill: '#ccc', stroke: '#999', text: '#333' };
    const fillScale = d3.scaleLinear().domain([0, catTotal]).range([0.35, 1]);

    const cells = svg.selectAll('.tm-cell')
      .data(hier.children)
      .join('g').attr('class', 'tm-cell')
      .attr('transform', d => `translate(${d.x0},${d.y0})`);

    cells.append('rect')
      .attr('width',  d => Math.max(0, d.x1 - d.x0))
      .attr('height', d => Math.max(0, d.y1 - d.y0))
      .attr('rx', 4)
      .attr('fill', d => {
        const c = d3.color(base.fill);
        c.opacity = 0.4 + fillScale(d.data.value) * 0.6;
        return c + '';
      })
      .attr('stroke', base.stroke)
      .attr('stroke-width', 1);

    cells.each(function(d) {
      const cw = d.x1 - d.x0, ch = d.y1 - d.y0;
      if (cw < 30 || ch < 16) return;
      const g = d3.select(this);
      const pct = ((d.data.value / catTotal) * 100).toFixed(1) + '%';
      if (ch > 44) {
        g.append('text').attr('x', 8).attr('y', 20)
          .attr('font-size', Math.min(13, cw / 7)).attr('font-weight', 500).attr('fill', base.text)
          .text(d.data.name.length > cw / 7 ? d.data.name.slice(0, Math.floor(cw / 7)) + '…' : d.data.name);
        g.append('text').attr('x', 8).attr('y', 36)
          .attr('font-size', 11).attr('fill', base.text).attr('opacity', 0.8)
          .text(d.data.value.toFixed(2) + ' Mtoe · ' + pct);
      } else {
        g.append('text').attr('x', 6).attr('y', ch / 2 + 4)
          .attr('font-size', Math.min(12, cw / 8)).attr('font-weight', 500).attr('fill', base.text)
          .text(d.data.name);
      }
    });
  }

  backBtn.addEventListener('click', drawTop);
  drawTop();
}

sel.addEventListener('change', render);
window.addEventListener('resize', render);
render();
</script>

</html>
